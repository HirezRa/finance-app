name: CI Security and Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  version-align:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify VERSION matches package.json and lockfiles
        run: node scripts/verify-version-align.cjs

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Backend install and build
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Frontend install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  docs-public-safety:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate public docs do not leak infra details
        run: node scripts/verify-public-docs-safety.cjs

  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Repo pattern scan (keys / private IPs)
        run: node scripts/verify-sensitive-repo-patterns.cjs

      - name: TruffleHog verified secrets scan
        run: |
          docker run --rm -v "$PWD:/repo" trufflesecurity/trufflehog:latest git file:///repo --only-verified --no-update
