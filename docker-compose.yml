services:
  db:
    image: postgres:16-alpine
    container_name: finance-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: finance_app
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance -d finance_app"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finance-network

  redis:
    image: redis:7-alpine
    container_name: finance-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finance-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: finance-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-false}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-30000}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OPENROUTER_ENABLED: ${OPENROUTER_ENABLED:-false}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-3.5-sonnet}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      N8N_ENABLED: ${N8N_ENABLED:-false}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-}
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET:-}
      SMTP_ENABLED: ${SMTP_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      LARGE_EXPENSE_THRESHOLD: ${LARGE_EXPENSE_THRESHOLD:-500}
      DAILY_SYNC_CRON: ${DAILY_SYNC_CRON:-0 6 * * *}
      SELF_UPDATE_ENABLED: ${SELF_UPDATE_ENABLED:-false}
      # Fixed paths — do not use ${APP_DIR}/${UPDATE_DATA_DIR} from host .env (older .env files often set UPDATE_DATA_DIR=/app/update-data, which breaks systemd triggers on the host).
      APP_DIR: /opt/finance-app
      UPDATE_DATA_DIR: /opt/finance-app/update-data
      # Optional: structured sync logs (see LOGGING_GUIDE.md)
      SCRAPER_GIT_SHA: ${SCRAPER_GIT_SHA:-}
      CHROMIUM_VERSION: ${CHROMIUM_VERSION:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # CMD runs `prisma migrate deploy` before Node listens — until then port 3000 is closed (nginx/API look "stuck").
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(\"http\").get(\"http://localhost:\"+(process.env.PORT||3000)+\"/api/v1/health\",(r)=>{r.resume();process.exit(r.statusCode===200?0:1);}).on(\"error\",()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s
    security_opt:
      - seccomp:unconfined
    group_add:
      - ${DOCKER_HOST_DOCKER_GID:-996}
    volumes:
      - ./logs:/app/logs
      # Self-update triggers/status — same directory tree as APP_DIR on host so systemd finance-app-updater.path sees `.update-requested`
      - ${FINANCE_HOST_APP_DIR:-.}/update-data:/opt/finance-app/update-data
      # Full repo on host for git pull / VERSION / scripts (self-update)
      - ${FINANCE_HOST_APP_DIR:-.}:/opt/finance-app
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - finance-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finance-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - finance-network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: finance-app-nginx:latest
    container_name: finance-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - finance-network

  bull-board:
    image: deadly0/bull-board
    container_name: finance-bull-board
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3001:3000"
    depends_on:
      - redis
    networks:
      - finance-network

networks:
  finance-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
